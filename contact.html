<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/indexStyle.css" media="screen and (min-width:1024px)">
    <link rel="stylesheet" href="css/mobile.css" media="screen and (max-width:768px)">
    <link rel="stylesheet" href="css/tab.css" media="screen and (min-width:768px) and (max-width:1024px)">
</head>

<body>
    <main class="main container">
        <header>
            <nav>
                <div class="portfolio">
                    Kathiravan
                </div>
                <ul class="link_ul">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="project.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <section class="contact_main">
            <section class="contact_forms">
                <form class="contact_form" action="success.html">
                    <table class="contact_table">
                        <tr>
                            <th><label for="name">Name : </label></th>
                            <td><input type="text" required placeholder="Name"></td>
                        </tr>
                        <tr>
                            <th><label for="emai">Email : </label></th>
                            <td><input type="email" name="" id="" placeholder="Mail Id" required Mail Id></td>
                        </tr>
                        <tr>
                            <th><label for="number">Subject : </label></th>
                            <td><input type="number" required placeholder="Phone"></td>
                        </tr>
                        <tr>
                            <th><label for="query">Message : </label></th>
                            <td><textarea name="query" id="" required placeholder="Message"></textarea></td>
                        </tr>
                        <tr>
                            <th colspan="2">
                                <input type="submit" value="Submit">
                            </th>
                        </tr>

                    </table>
                </form>

            </section>

        </section>
        <footer>
            <div class="contact_sm">
                <img src="images/linkedin.png" alt="">
                <img src="images/github.png" alt="">
                <img src="images/instagram.png" alt="">
                <img src="images/facebook.png" alt="">
                <img src="images/discord.png" alt="">

            </div>
            <div class="contact_text">
                <p>All &#169 Copy Rights reserved 2026</p>
            </div>
        </footer>
    </main>

</body>

</html>
